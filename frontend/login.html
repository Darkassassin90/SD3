<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in — CatchUp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-shell">
  <div class="auth-form-side" style="position:relative;">
    <div class="top-bar">
      <a href="/" class="wordmark"><span class="wordmark-dot"></span>CatchUp</a>
    </div>

    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="auth-subtitle">Log in to pick up your conversations right where you left them.</p>

      <div class="form-error" id="form-error"></div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Your username" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
        </div>

        <label class="checkbox-row" style="margin-bottom: 1.4rem;">
          <input type="checkbox" id="remember-me" checked>
          Remember me on this device
        </label>

        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Log in</button>
      </form>

      <p class="auth-switch">New to CatchUp? <a href="/register">Create an account</a></p>
    </div>
  </div>

  <div class="auth-art">
    <div class="auth-art-content">
      <h2>Stay signed in.</h2>
      <p>Once you log in, you'll stay logged in on this device until you choose to log out — no repeated sign-ins.</p>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
