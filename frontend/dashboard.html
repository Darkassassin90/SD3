<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — CatchUp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="app-shell" id="app-shell">

  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="wordmark"><span class="wordmark-dot"></span>CatchUp</span>
      <div class="profile-card">
        <div class="avatar lg" id="sidebar-avatar">--</div>
        <div class="profile-meta">
          <div class="name" id="sidebar-name">—</div>
          <div class="sub" id="sidebar-phone">—</div>
        </div>
      </div>
    </div>

    <div class="sidebar-tabs">
      <div class="sidebar-tab active" data-tab="friends">Friends</div>
      <div class="sidebar-tab" data-tab="requests">
        Requests
        <span class="badge" id="requests-badge"></span>
      </div>
    </div>

    <div class="sidebar-search">
      <div class="field" style="margin-bottom:0.4rem;">
        <input type="text" id="search-phone" class="is-mono" inputmode="numeric" placeholder="Search by 11-digit phone number" maxlength="11">
      </div>
      <div id="search-result"></div>
    </div>

    <div class="sidebar-list" id="panel-friends">
      <div id="friend-list"><div class="empty-note">Loading friends…</div></div>
    </div>

    <div class="sidebar-list" id="panel-requests" style="display:none;">
      <div id="request-list"><div class="empty-note">Loading requests…</div></div>
    </div>

    <div class="sidebar-footer">
      <button class="btn btn-ghost btn-block btn-sm" id="logout-btn">Log out</button>
    </div>
  </aside>

  <main class="main-panel">
    <div class="panel-placeholder">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" style="margin-bottom:1.2rem;">
        <circle cx="20" cy="20" r="11" fill="#0E7C7B"/>
        <circle cx="44" cy="44" r="11" fill="#FF6B5E"/>
        <path d="M28 26 C34 32, 38 36, 36 38" stroke="#C4CAD4" stroke-width="2" stroke-dasharray="1 7" stroke-linecap="round"/>
      </svg>
      <h2>Pick a conversation</h2>
      <p>Choose a friend from the list to keep chatting, or search a phone number to add someone new.</p>
    </div>
  </main>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
